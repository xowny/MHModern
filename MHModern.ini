[Main]
; MHModern conservative defaults.
; Use 1 to enable a feature and 0 to disable it.
; This profile keeps the recommended release defaults enabled by default.
; Extra compatibility patches can be turned on later once they are revalidated.

; --------------------------------------
; Audio
; --------------------------------------
; Wrap Miles startup and driver open so the game uses safer modern defaults.
EnableMilesAudioPatch=1

; Read the default Windows playback device and use its sample rate, bit depth, and channel count
; as the first fallback if the game's original Miles audio open fails.
; This keeps startup stable while still preferring the user's system format when fallback is needed.
DetectMilesPrimaryFormat=1

; If the game's original open fails, retry with the detected format below and then with the manual fallback values.
EnableMilesDriverFallback=1

; Buffer the raw SFX startup open so AUDIO\PC\SFX\SFX.RAW does not depend on unbuffered I/O.
; Leave this on unless you are specifically debugging the raw-file startup path.
EnableRawAudioBufferedOpen=1

; Manual fallback format used only if detection or the preferred open fails.
; These should stay on a conservative Miles-safe PCM format.
MilesFallbackRate=48000
MilesFallbackBits=16
MilesFallbackChannels=2

; --------------------------------------
; Audio Stream Event Fixes
; --------------------------------------
; Reuse throwaway audio-streamer event objects instead of constantly creating temporary ones.
EnableEventPatch=0
PoolAudioTempEvents=0

; --------------------------------------
; Stability and Compatibility
; --------------------------------------
; Heap hardening is available, but on Manhunt 1 it can interfere with Miles startup.
; Leave this off unless you are explicitly testing it on your own setup.
EnableHeapPatch=0
EnableHeapTerminateOnCorruption=1
EnableLowFragmentationHeap=1

; Wrap DirectInput so devices are reacquired automatically after focus/input loss.
EnableInputPatch=1
EnableInputAutoReacquire=1

; Replace mouse movement deltas with WM_INPUT raw mouse data while still keeping the game's DirectInput device flow.
; Leave this on for modern mice unless you are specifically debugging input behavior.
EnableRawMouseInput=1

; Return the real OS version instead of legacy compatibility-limited GetVersion results.
EnableVersionPatch=1

; Treat dpnhpast.dll as optional in the old DirectX compatibility probe.
EnableDirectXProbePatch=1

; Block Manhunt from changing global Windows settings such as screensaver, power, sticky keys, and foreground lock timeout.
EnableSystemParametersPatch=1

; Restore the process error mode correctly instead of forcing it back to zero at shutdown.
EnableErrorModePatch=1

; Replace imported legacy timer APIs with a QueryPerformanceCounter-backed clock.
EnableQpcTimerHooks=1

; Replace the game's internal RDTSC timing helper with stable QueryPerformanceCounter ticks.
EnableQpcRdtscHook=1

; Keep the direct wait-routine fix that removes the main busy-wait loop.
; This is a core modernization fix and should normally stay enabled.
; There is no user toggle for it because disabling it would mostly reintroduce old behavior.

; Write a crash dump on an unhandled crash so broken setups can be diagnosed later.
EnableCrashDumps=1

; Use a small dump by default. Full dumps are much larger and are only useful for deep debugging.
FullMemoryCrashDumps=0

; Folder name for crash dumps, created inside the game directory.
CrashDumpDirectory=MHModern_crashes

; Enable modern DPI awareness before the game creates its main window.
EnableModernDpiAwareness=1

; Request 1 ms scheduler granularity to reduce coarse legacy timing behavior.
EnableTimeBeginPeriod=1

; Ask modern Windows not to efficiency-throttle the Manhunt process when the API is available.
; This is a process-only opt-out and does not change any global Windows power settings.
EnablePowerThrottlingOptOut=1

; --------------------------------------
; Debug and Investigation
; --------------------------------------
; Log Miles startup and the exact audio format attempts to MHModern.log.
; Leave this off unless you are actively diagnosing audio initialization.
LogMilesAudioInit=0

; Log extra event-patch startup details.
LogEventPatchInit=0

; Log extra DirectInput, raw mouse, and window-hook startup details.
LogInputInit=0

; Log aggregated timer samples and top caller modules.
; Leave this off for normal play because it exists only for timing investigations.
EnableTimingTelemetry=0

; How often timing telemetry summaries are written, in milliseconds.
TimingTelemetryFlushMs=5000
